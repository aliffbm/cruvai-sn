services:
  # --- PostgreSQL with pgvector ---
  # NOTE: External port remapped to 5433 to avoid conflict with Cruvai Platform (port 5432)
  # Internal container port remains 5432 — no app code changes needed
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cruvai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cruvai}
      POSTGRES_DB: ${POSTGRES_DB:-cruvai_sn}
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_INITDB_ARGS: "--auth-host=trust"
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cruvai -d cruvai_sn"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Redis ---
  # NOTE: External port remapped to 6380 to avoid conflict with Cruvai Platform (port 6379)
  # Internal container port remains 6379 — no app code changes needed
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- FastAPI Backend ---
  # NOTE: External port remapped to 8001 to avoid conflict with Cruvai Platform API (port 8000)
  # Internal container port remains 8000 — no app code changes needed
  backend:
    build:
      context: ./backend
      dockerfile: ../infra/docker/Dockerfile.backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://cruvai:cruvai@postgres:5432/cruvai_sn
      DATABASE_URL_SYNC: postgresql://cruvai:cruvai@postgres:5432/cruvai_sn
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # --- Celery Worker ---
  worker:
    build:
      context: ./backend
      dockerfile: ../infra/docker/Dockerfile.backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://cruvai:cruvai@postgres:5432/cruvai_sn
      DATABASE_URL_SYNC: postgresql://cruvai:cruvai@postgres:5432/cruvai_sn
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4

  # --- Next.js Frontend ---
  # NOTE: External port remapped to 3001 to avoid conflict with Cruvai Platform Dashboard (port 3000)
  frontend:
    build:
      context: ./frontend
      dockerfile: ../infra/docker/Dockerfile.frontend
    ports:
      - "3001:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8001
      API_INTERNAL_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:
